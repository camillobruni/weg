<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weg — GPS Analysis</title>

  <link rel="stylesheet" href="dist/styles.css">

  <script type="importmap">
    {
      "imports": {
        "leaflet": "./dist/leaflet.mjs",
        "uplot": "./dist/uplot.mjs",
        "fit-file-parser": "./dist/fit-file-parser.mjs"
      }
    }
  </script>
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div class="logo">
          <span class="logo-icon material-symbols-rounded">terrain</span>
          <div>
            <div class="logo-title">Weg</div>
            <div class="logo-sub">GPS Analysis</div>
          </div>
        </div>
      </div>

      <div id="drop-zone" class="drop-idle" style="cursor: pointer;">
        <div class="drop-icon material-symbols-rounded">download</div>
        <div class="drop-primary">Drop GPS files here</div>
        <div class="drop-formats">
          <span class="badge">GPX</span>
          <span class="badge">FIT</span>
          <span class="badge">TCX</span>
          <span class="badge">KML</span>
        </div>
        <div class="drop-browse-container">
          <label class="drop-browse">
            or browse files
            <input type="file" id="file-input" multiple accept=".gpx,.fit,.tcx,.kml" hidden>
          </label>
          <span class="drop-separator">·</span>
          <label class="drop-browse" id="folder-label" for="folder-input">
            folders
            <input type="file" id="folder-input" webkitdirectory directory hidden>
          </label>
        </div>
      </div>

      <div id="track-list-header">
        <span class="section-label">Tracks</span>
        <div class="header-actions">
          <button id="btn-toggle-filters" title="Filter tracks" class="icon-btn"><span class="material-symbols-rounded">filter_alt</span></button>
          <button id="btn-fit-all" title="Fit all tracks on map" class="icon-btn"><span class="material-symbols-rounded">zoom_out_map</span></button>
          <button id="btn-clear-all" title="Remove all tracks" class="icon-btn danger"><span class="material-symbols-rounded">delete</span></button>
        </div>
      </div>

      <div id="track-controls">
        <div class="search-bar">
          <span class="material-symbols-rounded search-icon">search</span>
          <input type="text" id="track-search" placeholder="Search tracks...">
          <button id="btn-regex-toggle" class="icon-btn mini" title="Use Regular Expression">.*</button>
        </div>
        <div class="sort-ctrl">
          <label>Sort:</label>
          <button id="btn-sort-menu" class="sort-select-btn">
            <span id="sort-current-icon" class="material-symbols-rounded">calendar_today</span>
            <span id="sort-current-label">Date</span>
            <span class="material-symbols-rounded arrow">expand_more</span>
          </button>
        </div>
      </div>

      <div id="filter-panel" class="hidden">
        <div class="filter-group">
          <label><span class="material-symbols-rounded">calendar_month</span>Date Range</label>
          <div class="filter-row">
            <input type="date" id="filter-date-start">
            <span>to</span>
            <input type="date" id="filter-date-end">
          </div>
        </div>
        <div class="filter-group">
          <label><span class="material-symbols-rounded">route</span>Distance (km)</label>
          <div class="filter-row">
            <input type="number" id="filter-dist-min" placeholder="Min" min="0" step="1">
            <span>–</span>
            <input type="number" id="filter-dist-max" placeholder="Max" min="0" step="1">
          </div>
        </div>
        <div class="filter-group">
          <label><span class="material-symbols-rounded">schedule</span>Duration (h)</label>
          <div class="filter-row">
            <input type="number" id="filter-dur-min" placeholder="Min" min="0" step="0.5">
            <span>–</span>
            <input type="number" id="filter-dur-max" placeholder="Max" min="0" step="0.5">
          </div>
        </div>
        <div class="filter-group">
          <label><span class="material-symbols-rounded">query_stats</span>Has Metrics</label>
          <div id="filter-metrics" class="filter-metrics-grid">
            <button class="mini-pill" data-metric="power" title="Power"><span class="material-symbols-rounded">bolt</span></button>
            <button class="mini-pill" data-metric="hr" title="Heart Rate"><span class="material-symbols-rounded">favorite</span></button>
            <button class="mini-pill" data-metric="cadence" title="Cadence"><span class="material-symbols-rounded">directions_run</span></button>
            <button class="mini-pill" data-metric="temperature" title="Temperature"><span class="material-symbols-rounded">thermostat</span></button>
          </div>
        </div>
        <div class="filter-footer">
          <button id="btn-reset-filters" class="icon-btn" title="Reset Filters">
            <span class="material-symbols-rounded">filter_alt_off</span>
          </button>
        </div>
      </div>

      <div id="track-list">
        <div id="track-list-empty">No tracks loaded yet</div>
      </div>
    </aside>

    <div id="sidebar-resizer"></div>

    <!-- ── Main ── -->
    <div id="main">

      <!-- Map -->
      <div id="map-container">
        <div id="map"></div>

        <div id="map-controls">
          <div id="basemap-switcher">
            <button class="bm-btn active" data-layer="swisstopo">Swisstopo</button>
            <button class="bm-btn" data-layer="opentopomap">Topo</button>
            <button class="bm-btn" data-layer="osm">OSM</button>
            <button class="bm-btn" data-layer="satellite">Satellite</button>
          </div>
        </div>

        <div id="map-cursor-info"></div>
      </div>

      <!-- Resize handle -->
      <div id="resize-handle">
        <div class="handle-grip"></div>
      </div>

      <!-- Chart panel -->
      <div id="chart-panel">
        <div id="tab-nav">
          <button class="tab-btn active" data-tab="graphs">Analysis</button>
          <button class="tab-btn" data-tab="details">Details</button>
        </div>

        <div id="tab-graphs" class="tab-content active">
          <div id="chart-toolbar">
            <button id="btn-metric-menu" class="icon-btn" title="Select metrics to display">
              <span class="material-symbols-rounded">bar_chart</span>
              <span class="btn-label">Graphs</span>
              <span class="material-symbols-rounded">expand_more</span>
            </button>
            <div id="metric-pills">
              <button class="metric-pill active" data-metric="elevation" style="--pill-color:#4ECDC4" title="Toggle Elevation graph" draggable="true">
                <span class="material-symbols-rounded">height</span>Elevation
              </button>
              <button class="metric-pill active" data-metric="speed"     style="--pill-color:#45B7D1" title="Toggle Speed graph" draggable="true">
                <span class="material-symbols-rounded">speed</span>Speed
              </button>
              <button class="metric-pill"        data-metric="gradient"  style="--pill-color:#A8C8A0" title="Toggle Gradient graph" draggable="true">
                <span class="material-symbols-rounded">trending_up</span>Gradient
              </button>
              <button class="metric-pill"        data-metric="power"     style="--pill-color:#F7DC6F" title="Toggle Power graph" draggable="true">
                <span class="material-symbols-rounded">bolt</span>Power
              </button>
              <button class="metric-pill"        data-metric="hr"        style="--pill-color:#FF6B6B" title="Toggle Heart Rate graph" draggable="true">
                <span class="material-symbols-rounded">favorite</span>Heart Rate
              </button>
              <button class="metric-pill"        data-metric="cadence"   style="--pill-color:#BB8FCE" title="Toggle Cadence graph" draggable="true">
                <span class="material-symbols-rounded">directions_run</span>Cadence
              </button>
              <button class="metric-pill"        data-metric="temperature" style="--pill-color:#F8C471" title="Toggle Temperature graph" draggable="true">
                <span class="material-symbols-rounded">thermostat</span>Temp
              </button>
            </div>
            <div id="chart-options">
              <div id="x-axis-ctrl" class="seg-ctrl">
                <button class="seg-btn" data-axis="distance" title="Switch X-axis to Distance"><span class="material-symbols-rounded">route</span>Distance</button>
                <button class="seg-btn active" data-axis="time" title="Switch X-axis to Time"><span class="material-symbols-rounded">schedule</span>Time</button>
              </div>
              <button id="btn-follow-dot" class="icon-btn" title="Toggle Follow Point on Map"><span class="material-symbols-rounded">my_location</span></button>
              <button id="btn-reset-zoom" class="icon-btn" title="Reset Zoom and Clear Selection"><span class="material-symbols-rounded">restart_alt</span></button>
            </div>
          </div>

          <div id="chart-stats" class="hidden">
            <div id="chart-stats-wrap">
              <!-- Row: Total -->
              <div id="chart-stats-total" class="stats-row">
                <div class="stats-row-label">Total</div>
                <div class="stats-cell" id="stat-distance" title="Total Distance"><span class="stat-label">Dist</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="stat-duration" title="Total Duration"><span class="stat-label">Time</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="stat-elevation" title="Total Elevation Gain"><span class="stat-label">Elev</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="stat-avg-speed" title="Average Speed"><span class="stat-label">Avg Spd</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="stat-avg-power" title="Average Power"><span class="stat-label">Avg Pwr</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="stat-avg-hr" title="Average Heart Rate"><span class="stat-label">Avg HR</span><span class="stat-value">--</span></div>
              </div>
              <!-- Row: Selection -->
              <div id="chart-stats-sel" class="stats-row sel-row hidden">
                <div class="stats-row-label sel-label">
                  Sel <button id="sel-cancel-btn" class="icon-btn danger" title="Clear selection and reset range"><span class="material-symbols-rounded">close</span></button>
                </div>
                <div class="stats-cell" id="sel-distance" title="Selection Distance"><span class="stat-label">Dist</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="sel-duration" title="Selection Duration"><span class="stat-label">Time</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="sel-elevation" title="Selection Elevation Gain"><span class="stat-label">Elev</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="sel-avg-speed" title="Selection Average Speed"><span class="stat-label">Avg Spd</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="sel-avg-power" title="Selection Average Power"><span class="stat-label">Avg Pwr</span><span class="stat-value">--</span></div>
                <div class="stats-cell" id="sel-avg-hr" title="Selection Average Heart Rate"><span class="stat-label">Avg HR</span><span class="stat-value">--</span></div>
              </div>
            </div>
          </div>

          <div id="charts-container">
            <div id="chart-empty" class="empty-state">
              <span class="material-symbols-rounded empty-icon">no_sim</span>
              <div class="empty-text">Select a track to view analysis</div>
            </div>
          </div>
        </div>

        <div id="tab-details" class="tab-content">
          <div id="details-view">
            <div id="details-empty" class="empty-state">
              <span class="material-symbols-rounded empty-icon">no_sim</span>
              <div class="empty-text">Select a track for details</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="hist-tooltip"></div>
  <div id="hist-line"></div>

  <script src="dist/weg.mjs" type="module"></script>
</body>
</html>
