<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strasse — GPS Analysis</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- uPlot (fast time-series charts) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>

  <!-- EasyFit (FIT file parser) -->
  <script src="https://cdn.jsdelivr.net/npm/easy-fit@1.4.0/dist/easy-fit.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div class="logo">
          <span class="logo-icon material-symbols-rounded">terrain</span>
          <div>
            <div class="logo-title">Strasse</div>
            <div class="logo-sub">GPS Analysis</div>
          </div>
        </div>
      </div>

      <div id="drop-zone" class="drop-idle" style="cursor: pointer;">
        <div class="drop-icon material-symbols-rounded">download</div>
        <div class="drop-primary">Drop GPS files here</div>
        <div class="drop-formats">GPX · FIT · TCX · KML</div>
        <div class="drop-browse-container">
          <label class="drop-browse">
            or browse files
            <input type="file" id="file-input" multiple accept=".gpx,.fit,.tcx,.kml" hidden>
          </label>
          <span class="drop-separator">·</span>
          <label class="drop-browse" id="folder-label" for="folder-input">
            folders
            <input type="file" id="folder-input" webkitdirectory directory hidden>
          </label>
        </div>
      </div>

      <div id="track-list-header">
        <span class="section-label">Tracks</span>
        <div class="header-actions">
          <button id="btn-fit-all" title="Fit all tracks on map" class="icon-btn"><span class="material-symbols-rounded">zoom_out_map</span></button>
          <button id="btn-clear-all" title="Remove all tracks" class="icon-btn danger"><span class="material-symbols-rounded">delete</span></button>
        </div>
      </div>

      <div id="track-list">
        <div id="track-list-empty">No tracks loaded yet</div>
      </div>
    </aside>

    <!-- ── Main ── -->
    <div id="main">

      <!-- Map -->
      <div id="map-container">
        <div id="map"></div>

        <div id="map-controls">
          <div id="basemap-switcher">
            <button class="bm-btn active" data-layer="swisstopo">Swisstopo</button>
            <button class="bm-btn" data-layer="swisstopo-gray">Topo Gray</button>
            <button class="bm-btn" data-layer="opentopomap">Topo</button>
            <button class="bm-btn" data-layer="osm">OSM</button>
            <button class="bm-btn" data-layer="satellite">Satellite</button>
          </div>
        </div>

        <div id="map-cursor-info"></div>
      </div>

      <!-- Resize handle -->
      <div id="resize-handle">
        <div class="handle-grip"></div>
      </div>

      <!-- Chart panel -->
      <div id="chart-panel">
        <div id="tab-nav">
          <button class="tab-btn active" data-tab="graphs">Analysis</button>
          <button class="tab-btn" data-tab="details">Details</button>
        </div>

        <div id="tab-graphs" class="tab-content active">
          <div id="chart-toolbar">
            <div id="metric-pills">
              <button class="metric-pill active" data-metric="elevation" style="--pill-color:#4ECDC4">
                <span class="material-symbols-rounded">height</span>Elevation
              </button>
              <button class="metric-pill active" data-metric="speed"     style="--pill-color:#45B7D1">
                <span class="material-symbols-rounded">speed</span>Speed
              </button>
              <button class="metric-pill"        data-metric="gradient"  style="--pill-color:#A8C8A0">
                <span class="material-symbols-rounded">trending_up</span>Gradient
              </button>
              <button class="metric-pill"        data-metric="power"     style="--pill-color:#F7DC6F">
                <span class="material-symbols-rounded">bolt</span>Power
              </button>
              <button class="metric-pill"        data-metric="hr"        style="--pill-color:#FF6B6B">
                <span class="material-symbols-rounded">favorite</span>Heart Rate
              </button>
              <button class="metric-pill"        data-metric="cadence"   style="--pill-color:#BB8FCE">
                <span class="material-symbols-rounded">directions_run</span>Cadence
              </button>
              <button class="metric-pill"        data-metric="temperature" style="--pill-color:#F8C471">
                <span class="material-symbols-rounded">thermostat</span>Temp
              </button>
            </div>
            <div id="chart-options">
              <div id="x-axis-ctrl" class="seg-ctrl">
                <button class="seg-btn active" data-axis="distance"><span class="material-symbols-rounded">route</span>Distance</button>
                <button class="seg-btn" data-axis="time"><span class="material-symbols-rounded">schedule</span>Time</button>
              </div>
              <button id="btn-reset-zoom" class="icon-btn" title="Reset Zoom"><span class="material-symbols-rounded">restart_alt</span></button>
            </div>
          </div>

          <div id="chart-stats" class="hidden">
            <div id="chart-stats-wrap">
              <!-- Row: Total -->
              <div id="chart-stats-total" class="stats-row">
                <div class="stats-row-label">Total</div>
                <div class="stats-cell" data-metric="dist">--</div>
                <div class="stats-cell" data-metric="time">--</div>
                <div class="stats-cell" data-metric="moving">--</div>
                <div class="stats-cell" data-metric="ele-gain">--</div>
                <div class="stats-cell" data-metric="avg-speed">--</div>
                <div class="stats-cell" data-metric="max-speed">--</div>
              </div>
              <!-- Row: Selection -->
              <div id="chart-stats-sel" class="stats-row sel-row hidden">
                <div class="stats-row-label sel-label">
                  Sel <button id="btn-reset-selection" class="icon-btn danger hidden"><span class="material-symbols-rounded">close</span></button>
                </div>
                <div class="stats-cell" data-metric="dist">--</div>
                <div class="stats-cell" data-metric="time">--</div>
                <div class="stats-cell" data-metric="moving">--</div>
                <div class="stats-cell" data-metric="ele-gain">--</div>
                <div class="stats-cell" data-metric="avg-speed">--</div>
                <div class="stats-cell" data-metric="max-speed">--</div>
              </div>
            </div>
          </div>

          <div id="charts-container">
            <div id="chart-empty">Select a track to view analysis</div>
          </div>
        </div>

        <div id="tab-details" class="tab-content">
          <div id="details-view">
            <div id="details-empty">Select a track for details</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- App scripts -->
  <script src="js/storage.js"></script>
  <script src="js/url-state.js"></script>
  <script src="js/parsers.js"></script>
  <script src="js/map.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
